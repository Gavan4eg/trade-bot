<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC Trading Bot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        .pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
    </style>
</head>
<body class="bg-gray-900 text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // WebSocket hook
        function useWebSocket(url) {
            const [socket, setSocket] = useState(null);
            const [lastMessage, setLastMessage] = useState(null);
            const [isConnected, setIsConnected] = useState(false);

            useEffect(() => {
                const ws = new WebSocket(url);

                ws.onopen = () => {
                    console.log('WebSocket connected');
                    setIsConnected(true);
                };

                ws.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    setLastMessage(data);
                };

                ws.onclose = () => {
                    console.log('WebSocket disconnected');
                    setIsConnected(false);
                };

                ws.onerror = (error) => {
                    console.error('WebSocket error:', error);
                };

                setSocket(ws);

                // Ping to keep alive
                const pingInterval = setInterval(() => {
                    if (ws.readyState === WebSocket.OPEN) {
                        ws.send('ping');
                    }
                }, 30000);

                return () => {
                    clearInterval(pingInterval);
                    ws.close();
                };
            }, [url]);

            return { socket, lastMessage, isConnected };
        }

        // Alert Panel Component
        function AlertsPanel({ alerts }) {
            const getPriorityColor = (priority) => {
                switch(priority) {
                    case 1: return 'bg-purple-600';
                    case 2: return 'bg-blue-600';
                    case 3: return 'bg-green-600';
                    default: return 'bg-gray-600';
                }
            };

            const getStatusColor = (status) => {
                switch(status) {
                    case 'pending': return 'text-yellow-400';
                    case 'processing': return 'text-blue-400';
                    case 'confirmed': return 'text-green-400';
                    case 'traded': return 'text-purple-400';
                    case 'expired': return 'text-gray-400';
                    default: return 'text-gray-400';
                }
            };

            return (
                <div className="bg-gray-800 rounded-lg p-4">
                    <h2 className="text-xl font-bold mb-4 flex items-center">
                        <span className="w-2 h-2 bg-green-500 rounded-full mr-2 pulse"></span>
                        Alerts
                    </h2>
                    <div className="space-y-2 max-h-96 overflow-y-auto">
                        {alerts.length === 0 ? (
                            <p className="text-gray-500 text-center py-4">No alerts yet</p>
                        ) : (
                            alerts.map((alert, idx) => (
                                <div key={idx} className="bg-gray-700 rounded p-3 flex justify-between items-center">
                                    <div>
                                        <span className={`${getPriorityColor(alert.priority)} px-2 py-1 rounded text-xs mr-2`}>
                                            P{alert.priority}
                                        </span>
                                        <span className="font-semibold">{alert.type}</span>
                                        <span className={`ml-2 text-sm ${getStatusColor(alert.status)}`}>
                                            {alert.status}
                                        </span>
                                    </div>
                                    <div className="text-right">
                                        <div className="text-lg font-mono">${alert.price?.toLocaleString()}</div>
                                        <div className="text-xs text-gray-400">
                                            {new Date(alert.timestamp).toLocaleTimeString()}
                                        </div>
                                    </div>
                                </div>
                            ))
                        )}
                    </div>
                </div>
            );
        }

        // Positions Table Component
        function PositionsTable({ positions }) {
            const getDirectionColor = (direction) => {
                return direction === 'long' ? 'text-green-400' : 'text-red-400';
            };

            const getPnlColor = (pnl) => {
                return pnl >= 0 ? 'text-green-400' : 'text-red-400';
            };

            return (
                <div className="bg-gray-800 rounded-lg p-4">
                    <h2 className="text-xl font-bold mb-4">Active Positions</h2>
                    {positions.length === 0 ? (
                        <p className="text-gray-500 text-center py-4">No active positions</p>
                    ) : (
                        <div className="overflow-x-auto">
                            <table className="w-full text-sm">
                                <thead>
                                    <tr className="text-gray-400 border-b border-gray-700">
                                        <th className="text-left py-2">Direction</th>
                                        <th className="text-right">Entry</th>
                                        <th className="text-right">Current</th>
                                        <th className="text-right">Size</th>
                                        <th className="text-right">SL</th>
                                        <th className="text-right">TP1</th>
                                        <th className="text-right">PnL</th>
                                        <th className="text-right">Status</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {positions.map((pos, idx) => (
                                        <tr key={idx} className="border-b border-gray-700">
                                            <td className={`py-2 font-bold ${getDirectionColor(pos.direction)}`}>
                                                {pos.direction.toUpperCase()}
                                            </td>
                                            <td className="text-right font-mono">${pos.entry_price?.toLocaleString()}</td>
                                            <td className="text-right font-mono">${pos.current_price?.toLocaleString()}</td>
                                            <td className="text-right">{pos.current_quantity} BTC</td>
                                            <td className="text-right text-red-400 font-mono">${pos.stop_loss?.toLocaleString()}</td>
                                            <td className="text-right text-green-400 font-mono">${pos.take_profit_1?.toLocaleString()}</td>
                                            <td className={`text-right font-mono ${getPnlColor(pos.unrealized_pnl)}`}>
                                                ${pos.unrealized_pnl?.toFixed(2)}
                                            </td>
                                            <td className="text-right">
                                                <span className="bg-blue-600 px-2 py-1 rounded text-xs">
                                                    {pos.status}
                                                </span>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    )}
                </div>
            );
        }

        // Price Display Component
        function PriceDisplay({ price, high24h, low24h }) {
            return (
                <div className="bg-gray-800 rounded-lg p-4">
                    <div className="text-center">
                        <div className="text-sm text-gray-400">BTCUSDT</div>
                        <div className="text-4xl font-bold font-mono">
                            ${price?.toLocaleString() || '---'}
                        </div>
                        <div className="flex justify-center space-x-4 mt-2 text-sm">
                            <span className="text-green-400">H: ${high24h?.toLocaleString() || '---'}</span>
                            <span className="text-red-400">L: ${low24h?.toLocaleString() || '---'}</span>
                        </div>
                    </div>
                </div>
            );
        }

        // Stats Component
        function StatsPanel({ stats }) {
            return (
                <div className="bg-gray-800 rounded-lg p-4">
                    <h2 className="text-xl font-bold mb-4">Statistics</h2>
                    <div className="grid grid-cols-2 gap-4">
                        <div>
                            <div className="text-gray-400 text-sm">Total Trades</div>
                            <div className="text-2xl font-bold">{stats.total_trades || 0}</div>
                        </div>
                        <div>
                            <div className="text-gray-400 text-sm">Win Rate</div>
                            <div className="text-2xl font-bold text-green-400">{stats.win_rate || 0}%</div>
                        </div>
                        <div>
                            <div className="text-gray-400 text-sm">Wins / Losses</div>
                            <div className="text-lg">
                                <span className="text-green-400">{stats.wins || 0}</span>
                                {' / '}
                                <span className="text-red-400">{stats.losses || 0}</span>
                            </div>
                        </div>
                        <div>
                            <div className="text-gray-400 text-sm">Total PnL</div>
                            <div className={`text-2xl font-bold ${(stats.total_pnl || 0) >= 0 ? 'text-green-400' : 'text-red-400'}`}>
                                ${stats.total_pnl?.toFixed(2) || '0.00'}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Settings Component
        function SettingsPanel({ settings, onUpdate }) {
            const [localSettings, setLocalSettings] = useState(settings);

            const handleChange = (key, value) => {
                setLocalSettings(prev => ({ ...prev, [key]: value }));
            };

            const handleSave = async () => {
                try {
                    const response = await fetch('/api/settings', {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(localSettings)
                    });
                    if (response.ok) {
                        onUpdate(localSettings);
                        alert('Settings saved!');
                    }
                } catch (error) {
                    console.error('Failed to save settings:', error);
                }
            };

            return (
                <div className="bg-gray-800 rounded-lg p-4">
                    <h2 className="text-xl font-bold mb-4">Settings</h2>
                    <div className="space-y-4">
                        <div className="grid grid-cols-2 gap-4">
                            <div>
                                <label className="block text-sm text-gray-400">Max Positions</label>
                                <input
                                    type="number"
                                    value={localSettings.max_positions || 3}
                                    onChange={(e) => handleChange('max_positions', parseInt(e.target.value))}
                                    className="w-full bg-gray-700 rounded px-3 py-2 mt-1"
                                />
                            </div>
                            <div>
                                <label className="block text-sm text-gray-400">Risk per Trade (%)</label>
                                <input
                                    type="number"
                                    step="0.1"
                                    value={localSettings.risk_per_trade || 1}
                                    onChange={(e) => handleChange('risk_per_trade', parseFloat(e.target.value))}
                                    className="w-full bg-gray-700 rounded px-3 py-2 mt-1"
                                />
                            </div>
                            <div>
                                <label className="block text-sm text-gray-400">Min RR</label>
                                <input
                                    type="number"
                                    step="0.1"
                                    value={localSettings.min_rr || 2}
                                    onChange={(e) => handleChange('min_rr', parseFloat(e.target.value))}
                                    className="w-full bg-gray-700 rounded px-3 py-2 mt-1"
                                />
                            </div>
                            <div>
                                <label className="block text-sm text-gray-400">Min Confirmations</label>
                                <input
                                    type="number"
                                    value={localSettings.min_confirmations || 2}
                                    onChange={(e) => handleChange('min_confirmations', parseInt(e.target.value))}
                                    className="w-full bg-gray-700 rounded px-3 py-2 mt-1"
                                />
                            </div>
                        </div>

                        <div className="border-t border-gray-700 pt-4">
                            <h3 className="font-semibold mb-2">Take Profit Settings</h3>
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm text-gray-400">TP1 RR</label>
                                    <input
                                        type="number"
                                        step="0.1"
                                        value={localSettings.tp1_rr || 2}
                                        onChange={(e) => handleChange('tp1_rr', parseFloat(e.target.value))}
                                        className="w-full bg-gray-700 rounded px-3 py-2 mt-1"
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm text-gray-400">TP1 Close %</label>
                                    <input
                                        type="number"
                                        value={localSettings.tp1_close_percent || 50}
                                        onChange={(e) => handleChange('tp1_close_percent', parseInt(e.target.value))}
                                        className="w-full bg-gray-700 rounded px-3 py-2 mt-1"
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm text-gray-400">TP2 RR</label>
                                    <input
                                        type="number"
                                        step="0.1"
                                        value={localSettings.tp2_rr || 3}
                                        onChange={(e) => handleChange('tp2_rr', parseFloat(e.target.value))}
                                        className="w-full bg-gray-700 rounded px-3 py-2 mt-1"
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm text-gray-400">TP2 Close %</label>
                                    <input
                                        type="number"
                                        value={localSettings.tp2_close_percent || 30}
                                        onChange={(e) => handleChange('tp2_close_percent', parseInt(e.target.value))}
                                        className="w-full bg-gray-700 rounded px-3 py-2 mt-1"
                                    />
                                </div>
                            </div>
                        </div>

                        <button
                            onClick={handleSave}
                            className="w-full bg-blue-600 hover:bg-blue-700 rounded py-2 font-semibold"
                        >
                            Save Settings
                        </button>
                    </div>
                </div>
            );
        }

        // Bot Control Component
        function BotControl({ status, onStart, onStop }) {
            return (
                <div className="bg-gray-800 rounded-lg p-4">
                    <h2 className="text-xl font-bold mb-4">Bot Control</h2>
                    <div className="flex items-center justify-between mb-4">
                        <div className="flex items-center">
                            <span className={`w-3 h-3 rounded-full mr-2 ${status.is_active ? 'bg-green-500' : 'bg-red-500'}`}></span>
                            <span>{status.is_active ? 'Running' : 'Stopped'}</span>
                        </div>
                        <span className={`px-2 py-1 rounded text-sm ${status.testnet ? 'bg-yellow-600' : 'bg-green-600'}`}>
                            {status.testnet ? 'TESTNET' : 'MAINNET'}
                        </span>
                    </div>
                    <div className="flex space-x-2">
                        <button
                            onClick={onStart}
                            disabled={status.is_active}
                            className="flex-1 bg-green-600 hover:bg-green-700 disabled:bg-gray-600 rounded py-2 font-semibold"
                        >
                            Start Bot
                        </button>
                        <button
                            onClick={onStop}
                            disabled={!status.is_active}
                            className="flex-1 bg-red-600 hover:bg-red-700 disabled:bg-gray-600 rounded py-2 font-semibold"
                        >
                            Stop Bot
                        </button>
                    </div>
                </div>
            );
        }

        // Main App Component
        function App() {
            const [alerts, setAlerts] = useState([]);
            const [positions, setPositions] = useState([]);
            const [price, setPrice] = useState({ price: 0, high24h: 0, low24h: 0 });
            const [stats, setStats] = useState({});
            const [settings, setSettings] = useState({});
            const [botStatus, setBotStatus] = useState({ is_active: false, testnet: true });
            const [activeTab, setActiveTab] = useState('dashboard');

            const wsUrl = `ws://${window.location.host}/ws`;
            const { lastMessage, isConnected } = useWebSocket(wsUrl);

            // Handle WebSocket messages
            useEffect(() => {
                if (!lastMessage) return;

                switch (lastMessage.type) {
                    case 'alert':
                        setAlerts(prev => [lastMessage.data, ...prev.slice(0, 49)]);
                        break;
                    case 'price':
                        setPrice({
                            price: lastMessage.data.price,
                            high24h: lastMessage.data.high_24h,
                            low24h: lastMessage.data.low_24h
                        });
                        break;
                    case 'position':
                        // Update or add position
                        setPositions(prev => {
                            const idx = prev.findIndex(p => p.id === lastMessage.data.id);
                            if (idx >= 0) {
                                const updated = [...prev];
                                updated[idx] = { ...updated[idx], ...lastMessage.data };
                                return updated;
                            }
                            return [lastMessage.data, ...prev];
                        });
                        break;
                    case 'trade':
                        // Handle trade updates
                        break;
                }
            }, [lastMessage]);

            // Fetch initial data
            useEffect(() => {
                const fetchData = async () => {
                    try {
                        const [alertsRes, positionsRes, statsRes, settingsRes, statusRes] = await Promise.all([
                            fetch('/api/alerts').then(r => r.json()).catch(() => []),
                            fetch('/api/positions').then(r => r.json()).catch(() => []),
                            fetch('/api/stats').then(r => r.json()).catch(() => ({})),
                            fetch('/api/settings').then(r => r.json()).catch(() => ({})),
                            fetch('/api/settings/status').then(r => r.json()).catch(() => ({ is_active: false, testnet: true }))
                        ]);

                        setAlerts(alertsRes);
                        setPositions(positionsRes);
                        setStats(statsRes);
                        setSettings(settingsRes);
                        setBotStatus(statusRes);
                    } catch (error) {
                        console.error('Failed to fetch data:', error);
                    }
                };

                fetchData();
                // Обновляем позиции и статистику каждые 3 секунды
                const refreshInterval = setInterval(async () => {
                    try {
                        const [positionsRes, statsRes] = await Promise.all([
                            fetch('/api/positions').then(r => r.json()).catch(() => []),
                            fetch('/api/stats').then(r => r.json()).catch(() => ({})),
                        ]);
                        setPositions(positionsRes);
                        setStats(statsRes);
                    } catch (e) {}
                }, 3000);
                return () => clearInterval(refreshInterval);
            }, []);

            const handleStartBot = async () => {
                const res = await fetch('/api/settings/start', { method: 'POST' });
                if (res.ok) setBotStatus(prev => ({ ...prev, is_active: true }));
            };

            const handleStopBot = async () => {
                const res = await fetch('/api/settings/stop', { method: 'POST' });
                if (res.ok) setBotStatus(prev => ({ ...prev, is_active: false }));
            };

            return (
                <div className="min-h-screen">
                    {/* Header */}
                    <header className="bg-gray-800 border-b border-gray-700 p-4">
                        <div className="container mx-auto flex justify-between items-center">
                            <h1 className="text-2xl font-bold">BTC Trading Bot</h1>
                            <div className="flex items-center space-x-4">
                                <span className={`flex items-center ${isConnected ? 'text-green-400' : 'text-red-400'}`}>
                                    <span className={`w-2 h-2 rounded-full mr-2 ${isConnected ? 'bg-green-400' : 'bg-red-400'}`}></span>
                                    {isConnected ? 'Connected' : 'Disconnected'}
                                </span>
                            </div>
                        </div>
                    </header>

                    {/* Navigation */}
                    <nav className="bg-gray-800 border-b border-gray-700">
                        <div className="container mx-auto flex space-x-1 p-2">
                            {['dashboard', 'alerts', 'positions', 'settings'].map(tab => (
                                <button
                                    key={tab}
                                    onClick={() => setActiveTab(tab)}
                                    className={`px-4 py-2 rounded ${activeTab === tab ? 'bg-blue-600' : 'hover:bg-gray-700'}`}
                                >
                                    {tab.charAt(0).toUpperCase() + tab.slice(1)}
                                </button>
                            ))}
                        </div>
                    </nav>

                    {/* Main Content */}
                    <main className="container mx-auto p-4">
                        {activeTab === 'dashboard' && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
                                <div className="lg:col-span-2 space-y-4">
                                    <PriceDisplay {...price} />
                                    <PositionsTable positions={positions} />
                                    <AlertsPanel alerts={alerts} />
                                </div>
                                <div className="space-y-4">
                                    <BotControl
                                        status={botStatus}
                                        onStart={handleStartBot}
                                        onStop={handleStopBot}
                                    />
                                    <StatsPanel stats={stats} />
                                </div>
                            </div>
                        )}

                        {activeTab === 'alerts' && (
                            <AlertsPanel alerts={alerts} />
                        )}

                        {activeTab === 'positions' && (
                            <PositionsTable positions={positions} />
                        )}

                        {activeTab === 'settings' && (
                            <div className="max-w-2xl mx-auto">
                                <SettingsPanel
                                    settings={settings}
                                    onUpdate={setSettings}
                                />
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        // Render
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
