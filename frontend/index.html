<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC Trading Bot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
        @keyframes slideIn { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
        .pulse { animation: pulse 2s ease-in-out infinite; }
        .slide-in { animation: slideIn 0.3s ease-out; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 3px; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 font-sans">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── helpers ─────────────────────────────────── */
const fmt  = (n, d=2) => n != null ? Number(n).toLocaleString('en-US', {minimumFractionDigits:d,maximumFractionDigits:d}) : '—';
const fmtP = (n) => n != null ? Number(n).toFixed(2)+'%' : '—';
const ago  = (iso) => {
    const s = Math.floor((Date.now() - new Date(iso)) / 1000);
    if (s < 60) return s+'s ago';
    if (s < 3600) return Math.floor(s/60)+'m ago';
    return Math.floor(s/3600)+'h ago';
};

const PRIORITY_META = {
    1: { label:'Double Diamond', color:'text-purple-300', bg:'bg-purple-900/50', border:'border-purple-500', dot:'bg-purple-400' },
    2: { label:'Diamond',        color:'text-blue-300',   bg:'bg-blue-900/50',   border:'border-blue-500',   dot:'bg-blue-400' },
    3: { label:'Top Levels',     color:'text-cyan-300',   bg:'bg-cyan-900/50',   border:'border-cyan-500',   dot:'bg-cyan-400' },
    4: { label:'Liquidation',    color:'text-orange-300', bg:'bg-orange-900/50', border:'border-orange-500', dot:'bg-orange-400' },
};

const STATUS_META = {
    pending:        { label:'Pending',        color:'text-yellow-400', icon:'⏳' },
    processing:     { label:'Range detect',   color:'text-blue-400',   icon:'📊' },
    range_detected: { label:'Range OK',       color:'text-blue-400',   icon:'📐' },
    waiting_sweep:  { label:'Wait sweep',     color:'text-cyan-400',   icon:'🔍' },
    sweep_detected: { label:'Sweep ✓',        color:'text-green-400',  icon:'⚡' },
    confirmed:      { label:'Confirmed',      color:'text-green-300',  icon:'✅' },
    traded:         { label:'Traded',         color:'text-purple-300', icon:'💹' },
    expired:        { label:'Expired',        color:'text-gray-500',   icon:'⌛' },
    rejected:       { label:'Rejected',       color:'text-red-400',    icon:'❌' },
};

const PIPELINE_STEPS = ['pending','processing','waiting_sweep','sweep_detected','confirmed','traded'];
function pipelineIndex(status) {
    const i = PIPELINE_STEPS.indexOf(status);
    return i === -1 ? (status === 'range_detected' ? 2 : 0) : i;
}

/* ── WebSocket ───────────────────────────────── */
function useWebSocket(url) {
    const [lastMessage, setLastMessage] = useState(null);
    const [connected, setConnected] = useState(false);
    useEffect(() => {
        let ws, ping;
        function connect() {
            ws = new WebSocket(url);
            ws.onopen  = () => { setConnected(true); ping = setInterval(()=>ws.readyState===1&&ws.send('ping'),25000); };
            ws.onclose = () => { setConnected(false); clearInterval(ping); setTimeout(connect, 3000); };
            ws.onerror = () => ws.close();
            ws.onmessage = e => { try { setLastMessage(JSON.parse(e.data)); } catch{} };
        }
        connect();
        return () => { clearInterval(ping); ws && ws.close(); };
    }, [url]);
    return { lastMessage, connected };
}

/* ── Pipeline progress bar ───────────────────── */
function PipelineBar({ status }) {
    const idx = pipelineIndex(status);
    const labels = ['Pending','Range','Sweep','Confirm','Trade'];
    return (
        <div className="flex items-center gap-1 mt-2">
            {labels.map((l, i) => (
                <React.Fragment key={i}>
                    <div className="flex flex-col items-center">
                        <div className={`w-5 h-5 rounded-full flex items-center justify-center text-xs font-bold transition-all
                            ${i < idx ? 'bg-green-500 text-white' : i === idx ? 'bg-blue-500 text-white ring-2 ring-blue-300' : 'bg-gray-700 text-gray-500'}`}>
                            {i < idx ? '✓' : i+1}
                        </div>
                        <span className={`text-[10px] mt-0.5 ${i <= idx ? 'text-gray-300' : 'text-gray-600'}`}>{l}</span>
                    </div>
                    {i < labels.length-1 && (
                        <div className={`flex-1 h-0.5 mb-3 ${i < idx ? 'bg-green-500' : 'bg-gray-700'}`}/>
                    )}
                </React.Fragment>
            ))}
        </div>
    );
}

/* ── Alert Card ──────────────────────────────── */
function AlertCard({ alert }) {
    const [expanded, setExpanded] = useState(false);
    const meta   = PRIORITY_META[alert.priority] || PRIORITY_META[2];
    const status = STATUS_META[alert.status]     || { label: alert.status, color:'text-gray-400', icon:'•' };
    const p      = alert.pipeline || {};

    return (
        <div className={`slide-in rounded-xl border ${meta.border} ${meta.bg} p-4 cursor-pointer hover:brightness-110 transition-all`}
             onClick={() => setExpanded(e => !e)}>

            {/* Header row */}
            <div className="flex justify-between items-start">
                <div className="flex items-center gap-2">
                    <span className={`w-2 h-2 rounded-full ${meta.dot} ${alert.status==='processing'||alert.status==='waiting_sweep'?'pulse':''}`}/>
                    <span className={`font-bold ${meta.color}`}>{alert.type}</span>
                    <span className="text-xs bg-gray-800 px-2 py-0.5 rounded-full text-gray-400">P{alert.priority}</span>
                </div>
                <div className="text-right">
                    <div className="font-mono font-bold text-lg">${fmt(alert.price,0)}</div>
                    <div className="text-xs text-gray-500">{ago(alert.timestamp)}</div>
                </div>
            </div>

            {/* Status + pipeline */}
            <div className="flex items-center gap-2 mt-2">
                <span className={`text-xs ${status.color}`}>{status.icon} {status.label}</span>
                {alert.status === 'traded' && <span className="text-xs text-purple-400 bg-purple-900/40 px-2 py-0.5 rounded-full">Position opened</span>}
            </div>

            <PipelineBar status={alert.status} />

            {/* Expanded details */}
            {expanded && (
                <div className="mt-3 space-y-2 text-sm border-t border-gray-700/50 pt-3">

                    {/* Range */}
                    {p.range && (
                        <div className="bg-gray-900/60 rounded-lg p-3">
                            <div className="text-xs text-gray-400 font-semibold mb-2 uppercase tracking-wide">📐 Local Range</div>
                            <div className="grid grid-cols-2 gap-x-4 gap-y-1">
                                <span className="text-gray-400">High</span><span className="font-mono text-green-400">${fmt(p.range.local_high,0)}</span>
                                <span className="text-gray-400">Low</span><span className="font-mono text-red-400">${fmt(p.range.local_low,0)}</span>
                                <span className="text-gray-400">Mid</span><span className="font-mono">${fmt(p.range.mid,0)}</span>
                                <span className="text-gray-400">Width</span><span className="font-mono text-yellow-400">{fmtP(p.range.width_percent)}</span>
                                <span className="text-gray-400">TF / Candles</span><span className="font-mono">{p.range.timeframe} / {p.range.candles}</span>
                            </div>
                        </div>
                    )}

                    {/* Sweep */}
                    {p.sweep && (
                        <div className="bg-gray-900/60 rounded-lg p-3">
                            <div className="text-xs text-gray-400 font-semibold mb-2 uppercase tracking-wide">⚡ Liquidity Sweep</div>
                            <div className="grid grid-cols-2 gap-x-4 gap-y-1">
                                <span className="text-gray-400">Direction</span>
                                <span className={`font-bold ${p.sweep.direction==='low'?'text-green-400':'text-red-400'}`}>
                                    {p.sweep.direction==='low'?'↓ Below Low (LONG)':'↑ Above High (SHORT)'}
                                </span>
                                <span className="text-gray-400">Sweep price</span><span className="font-mono">${fmt(p.sweep.sweep_price,0)}</span>
                                <span className="text-gray-400">Level swept</span><span className="font-mono">${fmt(p.sweep.level_swept,0)}</span>
                                <span className="text-gray-400">Wick</span><span className="font-mono">{fmtP(p.sweep.wick_percent)}</span>
                                <span className="text-gray-400">Quick reversal</span>
                                <span className={p.sweep.quick_reversal?'text-green-400':'text-gray-500'}>{p.sweep.quick_reversal?'Yes':'No'}</span>
                            </div>
                        </div>
                    )}

                    {/* Confirmation */}
                    {p.confirmation && (
                        <div className="bg-gray-900/60 rounded-lg p-3">
                            <div className="text-xs text-gray-400 font-semibold mb-2 uppercase tracking-wide">✅ Confirmation</div>
                            <div className="grid grid-cols-2 gap-x-4 gap-y-1 mb-2">
                                <span className="text-gray-400">Direction</span>
                                <span className={`font-bold ${p.confirmation.direction==='long'?'text-green-400':'text-red-400'}`}>
                                    {p.confirmation.direction?.toUpperCase()}
                                </span>
                                <span className="text-gray-400">Entry price</span><span className="font-mono">${fmt(p.confirmation.entry_price,0)}</span>
                                <span className="text-gray-400">Stop loss</span><span className="font-mono text-red-400">${fmt(p.confirmation.stop_loss,0)}</span>
                                <span className="text-gray-400">Conditions</span>
                                <span className={p.confirmation.confirmed?'text-green-400':'text-yellow-400'}>
                                    {p.confirmation.conditions_met}/{p.confirmation.required}
                                </span>
                            </div>
                            {p.confirmation.details && (
                                <div className="grid grid-cols-2 gap-1">
                                    {Object.entries(p.confirmation.details).map(([k,v]) => (
                                        <div key={k} className="flex items-center gap-1">
                                            <span className={v?'text-green-400':'text-gray-600'}>{v?'✓':'✗'}</span>
                                            <span className="text-xs text-gray-400">{k.replace(/_/g,' ')}</span>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    )}

                    {/* Liquidation cluster */}
                    {p.liquidation_cluster?.length > 0 && (
                        <div className="bg-gray-900/60 rounded-lg p-3">
                            <div className="text-xs text-gray-400 font-semibold mb-2 uppercase tracking-wide">
                                🔥 Liquidation Cluster ({p.liquidation_cluster.length})
                            </div>
                            {p.liquidation_cluster.map((liq,i) => (
                                <div key={i} className="flex justify-between text-xs py-0.5">
                                    <span className={liq.side==='long'?'text-green-400':'text-red-400'}>{liq.side?.toUpperCase()} liq</span>
                                    <span className="font-mono">${fmt(liq.price,0)}</span>
                                    <span className="text-gray-400">{liq.volume ? '$'+fmt(liq.volume,0) : ''}</span>
                                </div>
                            ))}
                        </div>
                    )}

                    {/* Raw data */}
                    {alert.raw_data && (
                        <details className="text-xs">
                            <summary className="text-gray-500 cursor-pointer hover:text-gray-300">Raw webhook data</summary>
                            <pre className="mt-1 bg-gray-900 rounded p-2 text-gray-400 overflow-x-auto text-[11px]">
                                {JSON.stringify(alert.raw_data, null, 2)}
                            </pre>
                        </details>
                    )}
                </div>
            )}
        </div>
    );
}

/* ── Alerts Panel ────────────────────────────── */
function AlertsPanel({ alerts }) {
    return (
        <div className="bg-gray-900 rounded-xl p-4">
            <div className="flex items-center justify-between mb-4">
                <h2 className="text-lg font-bold flex items-center gap-2">
                    <span className="w-2 h-2 bg-blue-400 rounded-full pulse"/>
                    Alerts
                </h2>
                <span className="text-xs text-gray-500">{alerts.length} total</span>
            </div>
            <div className="space-y-3 max-h-[600px] overflow-y-auto pr-1">
                {alerts.length === 0
                    ? <p className="text-gray-600 text-center py-8">Waiting for signals from trdr.io...</p>
                    : alerts.map((a,i) => <AlertCard key={a.id||i} alert={a}/>)
                }
            </div>
        </div>
    );
}

/* ── Position Card ───────────────────────────── */
function PositionCard({ pos }) {
    const isLong = pos.direction === 'long';
    const pnl = pos.unrealized_pnl || 0;
    const entry = pos.entry_price || 0;
    const current = pos.current_price || entry;
    const pnlPct = entry > 0 ? ((current - entry) / entry * 100 * (isLong ? 1 : -1)) : 0;

    const tp1 = pos.take_profit_1;
    const tp2 = pos.take_profit_2;
    const sl  = pos.stop_loss;
    const risk = Math.abs(entry - (sl||entry));
    const tp1Dist = tp1 ? Math.abs(tp1 - entry) : 0;
    const progress = risk > 0 && tp1Dist > 0 ? Math.min(100, Math.abs(current-entry)/tp1Dist*100) : 0;

    const statusColors = {
        open:'text-green-400', tp1_hit:'text-blue-400', tp2_hit:'text-purple-400',
        trailing:'text-yellow-400', closed:'text-gray-500', stopped:'text-red-400'
    };

    return (
        <div className={`rounded-xl border p-4 ${isLong ? 'border-green-700 bg-green-950/30' : 'border-red-700 bg-red-950/30'}`}>
            <div className="flex justify-between items-start mb-3">
                <div className="flex items-center gap-2">
                    <span className={`text-lg font-bold ${isLong?'text-green-400':'text-red-400'}`}>
                        {isLong ? '▲ LONG' : '▼ SHORT'}
                    </span>
                    <span className="text-xs text-gray-400">{pos.current_quantity} BTC</span>
                    <span className={`text-xs px-2 py-0.5 rounded-full bg-gray-800 ${statusColors[pos.status]||'text-gray-400'}`}>
                        {pos.status}
                    </span>
                </div>
                <div className="text-right">
                    <div className={`text-xl font-bold font-mono ${pnl>=0?'text-green-400':'text-red-400'}`}>
                        {pnl>=0?'+':''}{fmt(pnl)}$
                    </div>
                    <div className={`text-xs ${pnlPct>=0?'text-green-500':'text-red-500'}`}>
                        {pnlPct>=0?'+':''}{pnlPct.toFixed(2)}%
                    </div>
                </div>
            </div>

            <div className="grid grid-cols-3 gap-2 text-sm mb-3">
                <div className="bg-gray-900/60 rounded-lg p-2">
                    <div className="text-xs text-gray-500">Entry</div>
                    <div className="font-mono font-semibold">${fmt(entry,0)}</div>
                </div>
                <div className="bg-gray-900/60 rounded-lg p-2">
                    <div className="text-xs text-gray-500">Current</div>
                    <div className={`font-mono font-semibold ${isLong?(current>entry?'text-green-400':'text-red-400'):(current<entry?'text-green-400':'text-red-400')}`}>
                        ${fmt(current,0)}
                    </div>
                </div>
                <div className="bg-gray-900/60 rounded-lg p-2">
                    <div className="text-xs text-gray-500">Realized</div>
                    <div className={`font-mono font-semibold ${(pos.realized_pnl||0)>=0?'text-green-400':'text-red-400'}`}>
                        {(pos.realized_pnl||0)>=0?'+':''}{fmt(pos.realized_pnl||0)}$
                    </div>
                </div>
            </div>

            {/* TP/SL levels */}
            <div className="grid grid-cols-3 gap-2 text-xs mb-3">
                <div className="text-center">
                    <div className="text-gray-500 mb-1">SL</div>
                    <div className="text-red-400 font-mono bg-red-950/40 rounded px-2 py-1">${fmt(sl,0)}</div>
                </div>
                <div className="text-center">
                    <div className="text-gray-500 mb-1">TP1 {pos.tp1_filled&&'✓'}</div>
                    <div className={`font-mono rounded px-2 py-1 ${pos.tp1_filled?'text-green-300 bg-green-900/40 line-through':'text-green-400 bg-green-950/40'}`}>
                        ${fmt(tp1,0)}
                    </div>
                </div>
                <div className="text-center">
                    <div className="text-gray-500 mb-1">TP2 {pos.tp2_filled&&'✓'}</div>
                    <div className={`font-mono rounded px-2 py-1 ${pos.tp2_filled?'text-green-300 bg-green-900/40 line-through':'text-green-400 bg-green-950/40'}`}>
                        ${fmt(tp2,0)}
                    </div>
                </div>
            </div>

            {/* Progress to TP1 */}
            <div>
                <div className="flex justify-between text-xs text-gray-500 mb-1">
                    <span>Progress to TP1</span><span>{progress.toFixed(0)}%</span>
                </div>
                <div className="h-1.5 bg-gray-800 rounded-full overflow-hidden">
                    <div className={`h-full rounded-full transition-all ${isLong?'bg-green-500':'bg-red-500'}`}
                         style={{width: Math.max(0,progress)+'%'}}/>
                </div>
            </div>

            {pos.trailing_stop && (
                <div className="mt-2 text-xs text-yellow-400 bg-yellow-950/30 rounded px-2 py-1">
                    🔄 Trailing stop: ${fmt(pos.trailing_stop,0)}
                </div>
            )}
        </div>
    );
}

/* ── Stats Panel ─────────────────────────────── */
function StatsPanel({ stats, balance }) {
    const cards = [
        { label:'Total Trades',   value: stats.total_trades||0,                          color:'text-white' },
        { label:'Win Rate',       value: (stats.win_rate||0)+'%',                        color:'text-green-400' },
        { label:'Wins / Losses',  value: `${stats.wins||0} / ${stats.losses||0}`,        color:'text-gray-300' },
        { label:'Total PnL',      value: '$'+(stats.total_pnl||0).toFixed(2),            color:(stats.total_pnl||0)>=0?'text-green-400':'text-red-400' },
        { label:'Balance',        value: '$'+fmt(balance?.total_balance),                color:'text-blue-300' },
        { label:'Available',      value: '$'+fmt(balance?.available_balance),            color:'text-cyan-300' },
    ];
    return (
        <div className="bg-gray-900 rounded-xl p-4">
            <h2 className="text-lg font-bold mb-4">Statistics</h2>
            <div className="grid grid-cols-2 gap-3">
                {cards.map(c => (
                    <div key={c.label} className="bg-gray-800 rounded-lg p-3">
                        <div className="text-xs text-gray-500">{c.label}</div>
                        <div className={`text-lg font-bold font-mono mt-1 ${c.color}`}>{c.value}</div>
                    </div>
                ))}
            </div>
        </div>
    );
}

/* ── Bot Control ─────────────────────────────── */
function BotControl({ status, onStart, onStop, onCloseAll }) {
    const [closing, setClosing] = useState(false);

    const handleCloseAll = async () => {
        if (!confirm('Close ALL open positions on exchange?')) return;
        setClosing(true);
        try {
            const r = await fetch('/api/settings/close-all', { method: 'POST' });
            const data = await r.json();
            if (data.errors?.length > 0) {
                alert('Closed with errors:\n' + data.errors.join('\n'));
            } else {
                alert(`Closed ${data.closed} position(s) successfully`);
            }
            onCloseAll && onCloseAll();
        } catch(e) {
            alert('Error: ' + e.message);
        } finally {
            setClosing(false);
        }
    };

    return (
        <div className="bg-gray-900 rounded-xl p-4">
            <div className="flex items-center justify-between mb-4">
                <h2 className="text-lg font-bold">Bot Control</h2>
                <span className={`text-xs px-2 py-1 rounded-full ${status.testnet?'bg-yellow-900 text-yellow-300':'bg-green-900 text-green-300'}`}>
                    {status.testnet?'TESTNET':'MAINNET'}
                </span>
            </div>
            <div className="flex items-center gap-2 mb-4">
                <span className={`w-3 h-3 rounded-full ${status.is_active?'bg-green-400 pulse':'bg-red-500'}`}/>
                <span className={status.is_active?'text-green-400':'text-red-400'}>
                    {status.is_active ? 'Running' : 'Stopped'}
                </span>
            </div>
            <div className="flex gap-2 mb-2">
                <button onClick={onStart} disabled={status.is_active}
                    className="flex-1 py-2 rounded-lg font-semibold bg-green-700 hover:bg-green-600 disabled:bg-gray-700 disabled:text-gray-500 transition-colors">
                    ▶ Start
                </button>
                <button onClick={onStop} disabled={!status.is_active}
                    className="flex-1 py-2 rounded-lg font-semibold bg-red-700 hover:bg-red-600 disabled:bg-gray-700 disabled:text-gray-500 transition-colors">
                    ■ Stop
                </button>
            </div>
            <button onClick={handleCloseAll} disabled={closing}
                className="w-full py-2 rounded-lg font-semibold bg-orange-800 hover:bg-orange-700 disabled:bg-gray-700 disabled:text-gray-500 transition-colors text-orange-200">
                {closing ? '⏳ Closing...' : '✕ Close All Positions'}
            </button>
        </div>
    );
}

/* ── Price Display ───────────────────────────── */
function PriceDisplay({ price, high24h, low24h, connected }) {
    return (
        <div className="bg-gray-900 rounded-xl p-4 text-center">
            <div className="text-xs text-gray-500 mb-1">BTCUSDT Perpetual</div>
            <div className="text-4xl font-bold font-mono tracking-tight">
                ${price ? fmt(price,0) : '———'}
            </div>
            <div className="flex justify-center gap-6 mt-2 text-sm">
                <span className="text-green-400">24h H: ${high24h ? fmt(high24h,0) : '—'}</span>
                <span className="text-red-400">24h L: ${low24h ? fmt(low24h,0) : '—'}</span>
            </div>
            <div className={`text-xs mt-2 ${connected?'text-green-500':'text-red-500'}`}>
                {connected ? '● Live' : '○ Reconnecting...'}
            </div>
        </div>
    );
}

/* ── Settings Panel ──────────────────────────── */
function SettingsPanel({ settings, onUpdate }) {
    const [s, setS] = useState(settings);
    useEffect(() => setS(settings), [settings]);

    const field = (label, key, type='number', step=1) => (
        <div>
            <label className="block text-xs text-gray-400 mb-1">{label}</label>
            <input type={type} step={step} value={s[key]||''}
                onChange={e => setS(p=>({...p,[key]:type==='number'?parseFloat(e.target.value):e.target.value}))}
                className="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500"/>
        </div>
    );

    const save = async () => {
        const r = await fetch('/api/settings',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(s)});
        if (r.ok) { onUpdate(s); alert('Saved!'); }
    };

    return (
        <div className="bg-gray-900 rounded-xl p-4 space-y-4">
            <h2 className="text-lg font-bold">Settings</h2>
            <div className="grid grid-cols-2 gap-3">
                {field('Max Positions','max_positions')}
                {field('Risk per Trade (%)','risk_per_trade','number',0.1)}
                {field('Min RR','min_rr','number',0.1)}
                {field('Min Confirmations','min_confirmations')}
            </div>
            <div className="border-t border-gray-800 pt-4">
                <h3 className="text-sm font-semibold text-gray-300 mb-3">Take Profit</h3>
                <div className="grid grid-cols-2 gap-3">
                    {field('TP1 RR','tp1_rr','number',0.1)}
                    {field('TP1 Close %','tp1_close_percent')}
                    {field('TP2 RR','tp2_rr','number',0.1)}
                    {field('TP2 Close %','tp2_close_percent')}
                </div>
            </div>
            <button onClick={save} className="w-full py-2 bg-blue-600 hover:bg-blue-500 rounded-lg font-semibold transition-colors">
                Save Settings
            </button>
        </div>
    );
}

/* ── Logs Panel ──────────────────────────────── */
const LOG_COLORS = {
    info:    'text-blue-300',
    success: 'text-green-400',
    warning: 'text-yellow-400',
    error:   'text-red-400',
};
const SOURCE_COLORS = {
    webhook:  'bg-purple-900/60 text-purple-300',
    pipeline: 'bg-blue-900/60 text-blue-300',
    trade:    'bg-green-900/60 text-green-300',
};

function LogsPanel({ logs, onClear, logsEndRef }) {
    return (
        <div className="bg-gray-900 rounded-xl p-4 h-[calc(100vh-180px)] flex flex-col">
            <div className="flex items-center justify-between mb-3">
                <h2 className="text-lg font-bold flex items-center gap-2">
                    📋 Live Logs
                    <span className="text-xs text-gray-500 font-normal">({logs.length} entries)</span>
                </h2>
                <button onClick={onClear}
                    className="text-xs text-gray-500 hover:text-red-400 transition-colors px-3 py-1 border border-gray-700 rounded-lg">
                    Clear
                </button>
            </div>
            <div className="flex-1 overflow-y-auto font-mono text-xs space-y-0.5 pr-1">
                {logs.length === 0 && (
                    <div className="text-gray-600 text-center mt-12">
                        No logs yet. Send a webhook to start seeing activity.
                    </div>
                )}
                {logs.map(log => (
                    <div key={log.id} className="flex items-start gap-2 py-1 border-b border-gray-800/50 hover:bg-gray-800/30 px-1 rounded">
                        <span className="text-gray-600 shrink-0 w-16">{log.timestamp}</span>
                        {log.source && (
                            <span className={`shrink-0 px-1.5 py-0.5 rounded text-[10px] font-bold ${SOURCE_COLORS[log.source] || 'bg-gray-800 text-gray-400'}`}>
                                {log.source}
                            </span>
                        )}
                        <span className={`${LOG_COLORS[log.level] || 'text-gray-300'} break-all`}>
                            {log.message}
                        </span>
                    </div>
                ))}
                <div ref={logsEndRef}/>
            </div>
        </div>
    );
}

/* ── Main App ────────────────────────────────── */
function App() {
    const [alerts, setAlerts]       = useState([]);
    const [positions, setPositions] = useState([]);
    const [price, setPrice]         = useState({});
    const [stats, setStats]         = useState({});
    const [balance, setBalance]     = useState({});
    const [settings, setSettings]   = useState({});
    const [botStatus, setBotStatus] = useState({ is_active:false, testnet:true });
    const [tab, setTab]             = useState('dashboard');
    const [logs, setLogs]           = useState([]);
    const logsEndRef                = useRef(null);

    const wsProto = window.location.protocol === 'https:' ? 'wss' : 'ws';
    const { lastMessage, connected } = useWebSocket(`${wsProto}://${window.location.host}/ws`);

    useEffect(() => {
        if (!lastMessage) return;
        if (lastMessage.type === 'alert') setAlerts(p => [lastMessage.data, ...p.slice(0,49)]);
        if (lastMessage.type === 'price') setPrice({ price:lastMessage.data.price, high24h:lastMessage.data.high_24h, low24h:lastMessage.data.low_24h });
        if (lastMessage.type === 'position') setPositions(p => {
            const i = p.findIndex(x => x.id === lastMessage.data.id);
            if (i>=0) { const u=[...p]; u[i]={...u[i],...lastMessage.data}; return u; }
            return [lastMessage.data,...p];
        });
        if (lastMessage.type === 'log') {
            setLogs(p => [...p.slice(-199), { ...lastMessage.data, id: Date.now() }]);
        }
    }, [lastMessage]);

    useEffect(() => {
        if (tab === 'logs') logsEndRef.current?.scrollIntoView({ behavior: 'smooth' });
    }, [logs, tab]);

    useEffect(() => {
        const load = async () => {
            const [a,pos,st,se,status,bal] = await Promise.all([
                fetch('/api/alerts').then(r=>r.json()).catch(()=>[]),
                fetch('/api/positions').then(r=>r.json()).catch(()=>[]),
                fetch('/api/stats').then(r=>r.json()).catch(()=>({})),
                fetch('/api/settings').then(r=>r.json()).catch(()=>({})),
                fetch('/api/settings/status').then(r=>r.json()).catch(()=>({is_active:false,testnet:true})),
                fetch('/api/settings/balance').then(r=>r.json()).catch(()=>({})),
            ]);
            setAlerts(a); setPositions(pos); setStats(st); setSettings(se); setBotStatus(status); setBalance(bal);
        };
        load();
        const t = setInterval(async () => {
            const [pos,st,bal] = await Promise.all([
                fetch('/api/positions').then(r=>r.json()).catch(()=>[]),
                fetch('/api/stats').then(r=>r.json()).catch(()=>({})),
                fetch('/api/settings/balance').then(r=>r.json()).catch(()=>({})),
            ]);
            setPositions(pos); setStats(st); setBalance(bal);
            // Also refresh alerts to get pipeline state updates
            fetch('/api/alerts').then(r=>r.json()).then(setAlerts).catch(()=>{});
        }, 3000);
        return () => clearInterval(t);
    }, []);

    const startBot = async () => { await fetch('/api/settings/start',{method:'POST'}); setBotStatus(p=>({...p,is_active:true})); };
    const stopBot  = async () => { await fetch('/api/settings/stop',{method:'POST'});  setBotStatus(p=>({...p,is_active:false})); };

    const tabs = ['dashboard','alerts','positions','logs','settings'];

    return (
        <div className="min-h-screen flex flex-col">
            {/* Header */}
            <header className="bg-gray-900 border-b border-gray-800 px-6 py-3 flex items-center justify-between">
                <div className="flex items-center gap-3">
                    <span className="text-2xl">₿</span>
                    <h1 className="text-xl font-bold tracking-tight">BTC Trading Bot</h1>
                </div>
                <div className="flex items-center gap-4 text-sm">
                    <span className={botStatus.testnet?'text-yellow-400':'text-green-400'}>
                        {botStatus.testnet?'Testnet':'Mainnet'}
                    </span>
                    <span className={connected?'text-green-400 flex items-center gap-1':'text-red-400 flex items-center gap-1'}>
                        <span className={`w-2 h-2 rounded-full ${connected?'bg-green-400 pulse':'bg-red-500'}`}/>
                        {connected?'Live':'Offline'}
                    </span>
                    <a href="/logout" className="text-gray-500 hover:text-gray-300 transition-colors text-xs">Logout</a>
                </div>
            </header>

            {/* Nav */}
            <nav className="bg-gray-900 border-b border-gray-800 px-6 flex gap-1">
                {tabs.map(t => (
                    <button key={t} onClick={()=>setTab(t)}
                        className={`px-4 py-2.5 text-sm font-medium capitalize border-b-2 transition-colors
                            ${tab===t ? 'border-blue-500 text-blue-400' : 'border-transparent text-gray-400 hover:text-gray-200'}`}>
                        {t}
                    </button>
                ))}
            </nav>

            {/* Content */}
            <main className="flex-1 p-4 max-w-7xl mx-auto w-full">
                {tab === 'dashboard' && (
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
                        <div className="lg:col-span-2 space-y-4">
                            <PriceDisplay {...price} connected={connected}/>
                            <div>
                                <h2 className="text-lg font-bold mb-3">Active Positions ({positions.filter(p=>p.status!=='closed'&&p.status!=='stopped').length})</h2>
                                {positions.length===0
                                    ? <div className="bg-gray-900 rounded-xl p-8 text-center text-gray-600">No active positions</div>
                                    : <div className="space-y-3">{positions.map((p,i)=><PositionCard key={p.id||i} pos={p}/>)}</div>
                                }
                            </div>
                            <AlertsPanel alerts={alerts.slice(0,5)}/>
                        </div>
                        <div className="space-y-4">
                            <BotControl status={botStatus} onStart={startBot} onStop={stopBot} onCloseAll={() => fetch('/api/positions').then(r=>r.json()).then(setPositions)}/>
                            <StatsPanel stats={stats} balance={balance}/>
                        </div>
                    </div>
                )}
                {tab === 'alerts'    && <AlertsPanel alerts={alerts}/>}
                {tab === 'positions' && (
                    <div className="space-y-3">
                        {positions.length===0
                            ? <div className="bg-gray-900 rounded-xl p-12 text-center text-gray-600">No positions</div>
                            : positions.map((p,i)=><PositionCard key={p.id||i} pos={p}/>)
                        }
                    </div>
                )}
                {tab === 'settings'  && <div className="max-w-lg"><SettingsPanel settings={settings} onUpdate={setSettings}/></div>}
                {tab === 'logs' && <LogsPanel logs={logs} onClear={()=>setLogs([])} logsEndRef={logsEndRef}/>}
            </main>
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
